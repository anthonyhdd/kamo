<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0a0a0f" />
<meta name="robots" content="noindex,nofollow" />
<title>HIDEY — trouve le petit bonhomme</title>
<style>
  :root{
    --bg:#0a0a0f; --panel:rgba(18,18,26,.82); --stroke:rgba(255,255,255,.12);
    --accent:#39e6a4; --accent2:#7c5cff; --danger:#ff5670; --text:#f4f4f8;
    --safe-b: env(safe-area-inset-bottom, 0px);
    --safe-t: env(safe-area-inset-top, 0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro",Inter,system-ui,sans-serif;
    overflow:hidden; overscroll-behavior:none; touch-action:none;}
  #app{position:fixed;inset:0;display:flex;flex-direction:column;}

  /* ---------- STAGE ---------- */
  #stage{position:relative;flex:1;overflow:hidden;background:#111;}
  #cam,#photo,#board{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;}
  #board{touch-action:none;}
  #placeholder{position:absolute;inset:0;display:flex;flex-direction:column;gap:14px;
    align-items:center;justify-content:center;text-align:center;padding:30px;
    background:radial-gradient(120% 120% at 50% 20%,#1b2a3a,#0a0a0f 70%);}
  #placeholder h1{font-size:26px;margin:0;letter-spacing:.5px}
  #placeholder p{opacity:.7;margin:0;font-size:14px;max-width:280px;line-height:1.45}
  #placeholder .primary{flex:0 0 auto;width:min(260px,82%);margin-top:6px;}
  .figLayer{position:absolute;inset:0;pointer-events:none;}   /* never intercept taps on empty stage / start screen */
  .fig{position:absolute;transform-origin:center center;will-change:transform;cursor:grab;pointer-events:auto;filter:drop-shadow(0 6px 12px rgba(0,0,0,.45));}
  .fig svg{display:block;width:100%;height:100%;pointer-events:none;}
  .fig.selected{outline:2px dashed var(--accent);outline-offset:6px;border-radius:8px;}

  .hint{position:absolute;top:calc(12px + var(--safe-t));left:50%;transform:translateX(-50%);
    background:var(--panel);backdrop-filter:blur(14px);border:1px solid var(--stroke);
    padding:8px 14px;border-radius:999px;font-size:12.5px;white-space:nowrap;
    box-shadow:0 4px 20px rgba(0,0,0,.4);pointer-events:none;transition:opacity .3s;}

  .brand{position:absolute;top:calc(12px + var(--safe-t));left:16px;font-weight:800;
    letter-spacing:1px;font-size:15px;opacity:.9;text-shadow:0 2px 8px rgba(0,0,0,.6);}
  .brand span{color:var(--accent);}

  /* selected-figure floating toolbar */
  #figbar{position:absolute;left:50%;transform:translateX(-50%);
    bottom:calc(96px + var(--safe-b));display:none;gap:6px;align-items:center;
    background:var(--panel);backdrop-filter:blur(14px);border:1px solid var(--stroke);
    padding:6px;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,.5);}
  #figbar button{width:42px;height:42px;font-size:18px;}

  /* ---------- BOTTOM CONTROLS ---------- */
  #controls{position:relative;z-index:5;padding:10px 12px calc(10px + var(--safe-b));
    background:linear-gradient(180deg,rgba(10,10,15,0),rgba(10,10,15,.9) 30%,var(--bg));}
  .row{display:flex;gap:8px;align-items:center;justify-content:center;}
  .row+.row{margin-top:8px;}
  button{border:1px solid var(--stroke);background:rgba(255,255,255,.06);color:var(--text);
    border-radius:14px;padding:0 14px;height:46px;font-size:14px;font-weight:600;
    display:inline-flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;
    transition:transform .06s, background .15s;}
  button:active{transform:scale(.94);}
  button.primary{background:linear-gradient(135deg,var(--accent),#2bd0b0);color:#04241a;border:none;flex:1;height:54px;font-size:16px;font-weight:800;}
  button.primary.purple{background:linear-gradient(135deg,var(--accent2),#5a3cff);color:#fff;}
  button.ghost{background:transparent;}
  button.icon{width:46px;padding:0;font-size:20px;}
  button.small{height:40px;padding:0 12px;font-size:13px;}

  /* palette */
  #paintUI{display:none;}
  #swatches{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 6px;scrollbar-width:none;}
  #swatches::-webkit-scrollbar{display:none;}
  .sw{flex:0 0 auto;width:34px;height:34px;border-radius:50%;border:2px solid rgba(255,255,255,.25);cursor:pointer;position:relative;}
  .sw.active{border-color:#fff;box-shadow:0 0 0 2px var(--accent);}
  .sw.picker{display:flex;align-items:center;justify-content:center;background:conic-gradient(red,#ff0,#0f0,#0ff,#00f,#f0f,red);}
  .sw.picker input{position:absolute;inset:0;opacity:0;width:100%;height:100%;border:none;padding:0;}
  #eyedrop{border:2px solid rgba(255,255,255,.25);}
  #eyedrop.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent);}
  .brushrow{display:flex;gap:8px;align-items:center;justify-content:center;}
  .bsz{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid var(--stroke);background:rgba(255,255,255,.06);}
  .bsz.active{border-color:var(--accent);background:rgba(57,230,164,.15);}
  .bsz i{display:block;border-radius:50%;background:#fff;}

  input[type=range]{-webkit-appearance:none;height:4px;border-radius:4px;background:rgba(255,255,255,.2);flex:1;max-width:160px;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--accent);border:2px solid #04241a;}
  .file{display:none;}
  .badge{font-size:11px;opacity:.6;text-align:center;margin-top:6px;}

  /* eyedropper live loupe */
  #loupe{position:absolute;width:66px;height:66px;border-radius:50%;border:3px solid #fff;
    box-shadow:0 4px 16px rgba(0,0,0,.6);display:none;pointer-events:none;z-index:20;
    background-size:cover;transform:translate(-50%,-130%);}
  #loupe::after{content:"";position:absolute;inset:0;border-radius:50%;}
  #loupe .dot{position:absolute;left:50%;top:50%;width:8px;height:8px;margin:-4px 0 0 -4px;border:1px solid #000;border-radius:50%;background:rgba(255,255,255,.4);}
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <div id="placeholder">
      <h1>🦎 HIDEY</h1>
      <p>Camoufle un petit bonhomme dans ton décor, puis lance le défi : <b>« Tu me trouves ? »</b></p>
      <button class="primary" id="startCam" style="max-width:240px">📷 Ouvrir la caméra</button>
      <button class="ghost small" id="startPhoto">ou choisir une photo</button>
    </div>
    <video id="cam" playsinline autoplay muted></video>
    <img id="photo" alt="" />
    <canvas id="board"></canvas>
    <div class="figLayer" id="figLayer"></div>
    <div class="brand">HI<span>DEY</span></div>
    <div class="hint" id="hint"></div>
    <div id="figbar">
      <button class="icon" data-fig="smaller">➖</button>
      <button class="icon" data-fig="bigger">➕</button>
      <button class="icon" data-fig="rotL">↺</button>
      <button class="icon" data-fig="rotR">↻</button>
      <button class="icon" data-fig="flip">🔁</button>
      <button class="icon" data-fig="pose">🕺</button>
      <button class="icon" data-fig="del">🗑️</button>
    </div>
    <div id="loupe"><div class="dot"></div></div>
  </div>

  <div id="controls">
    <!-- COMPOSE MODE -->
    <div id="composeUI">
      <div class="row">
        <button class="icon" id="btnFlipCam" title="Changer de caméra">🔄</button>
        <button class="icon" id="btnPhoto" title="Photo">🖼️</button>
        <button id="btnAdd">➕ Bonhomme</button>
        <button class="icon" id="btnPose" title="Pose">🕺</button>
      </div>
      <div class="row">
        <button class="primary" id="btnCapture">📸 Capturer la scène</button>
      </div>
      <div class="badge">Place le bonhomme • pince/glisse pour bouger • capture pour peindre</div>
    </div>

    <!-- PAINT MODE -->
    <div id="paintUI">
      <div id="swatches"></div>
      <div class="row" style="margin-top:2px">
        <div class="brushrow">
          <button class="bsz" data-sz="10"><i style="width:8px;height:8px"></i></button>
          <button class="bsz active" data-sz="22"><i style="width:14px;height:14px"></i></button>
          <button class="bsz" data-sz="44"><i style="width:22px;height:22px"></i></button>
        </div>
        <button class="icon" id="btnUndo" title="Annuler">↩️</button>
        <button class="icon" id="btnClear" title="Effacer">🧽</button>
      </div>
      <div class="row" style="margin-top:8px">
        <button class="ghost small" id="btnBack">← Reprendre</button>
        <button class="primary purple" id="btnShare">↗ Partager le défi</button>
        <button class="icon" id="btnSave" title="Enregistrer">⬇️</button>
      </div>
      <div class="badge">💧 Pipette = choper la couleur exacte du décor → camouflage parfait</div>
    </div>
  </div>
</div>

<input type="file" accept="image/*" class="file" id="fileInput" />

<script>
"use strict";
/* ============================================================
   HIDEY — prototype photo-toy (MECCHA CHAMELEON, version solo/AR)
   Boucle : caméra/photo → poser bonhomme blanc → capturer → peindre
   (pipette + palette) → partager. Single-file, mobile-first.
   ============================================================ */

const $ = s => document.querySelector(s);
const stage = $("#stage"), cam = $("#cam"), photo = $("#photo"), board = $("#board");
const figLayer = $("#figLayer"), placeholder = $("#placeholder");
const composeUI = $("#composeUI"), paintUI = $("#paintUI");
const hint = $("#hint"), figbar = $("#figbar"), loupe = $("#loupe");
const ctx = board.getContext("2d", { willReadFrequently: true });

let mode = "compose";           // "compose" | "paint"
let bgKind = null;              // "cam" | "photo"
let facing = "environment";
let stream = null;
let figures = [];              // {el,x,y,scale,rot,flip,pose}
let selected = null;
let dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));

/* ---------- white "mannequin" figure — pure white filled body, soft grey rim
   for volume (no harsh black outline), poseable. viewBox 0 0 100 200 ---------- */
function figureSVG(pose){
  const E="#d9d9e0", F="#ffffff";                     // edge rim + white fill
  const cap=(x1,y1,x2,y2,w)=>({                        // rounded capsule limb
    e:`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${E}" stroke-width="${w+3}" stroke-linecap="round"/>`,
    f:`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${F}" stroke-width="${w}" stroke-linecap="round"/>` });
  const rr=(x,y,w,h,r)=>({                             // rounded-rect torso
    e:`<rect x="${x-1.5}" y="${y-1.5}" width="${w+3}" height="${h+3}" rx="${r+1.5}" fill="${E}"/>`,
    f:`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${r}" fill="${F}"/>` });
  const cc=(cx,cy,r)=>({                               // head
    e:`<circle cx="${cx}" cy="${cy}" r="${r+1.5}" fill="${E}"/>`,
    f:`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${F}"/>` });
  let p=[];
  if(pose==="stand"){
    p=[cap(41,62,24,106,16),cap(59,62,76,106,16),cap(44,116,34,180,18),cap(56,116,66,180,18),rr(35,50,30,68,15),cc(50,28,20)];
  } else if(pose==="arms-up"){
    p=[cap(41,60,20,22,16),cap(59,60,80,22,16),cap(44,116,36,180,18),cap(56,116,64,180,18),rr(35,50,30,68,15),cc(50,28,20)];
  } else if(pose==="wave"){
    p=[cap(41,62,26,106,16),cap(59,58,84,24,16),cap(44,116,36,180,18),cap(56,116,64,180,18),rr(35,50,30,68,15),cc(50,28,20)];
  } else if(pose==="run"){
    p=[cap(42,60,72,46,16),cap(58,64,30,88,16),cap(46,116,24,150,18),cap(56,116,80,168,18),rr(35,50,30,66,15),cc(52,28,20)];
  } else { // sit
    p=[cap(41,62,28,100,16),cap(59,62,72,100,16),cap(46,114,22,116,18),cap(22,116,22,152,18),cap(54,114,78,116,18),cap(78,116,78,152,18),rr(35,48,30,60,15),cc(50,30,20)];
  }
  return `<svg viewBox="0 0 100 200" xmlns="http://www.w3.org/2000/svg"><g>${p.map(x=>x.e).join("")}</g><g>${p.map(x=>x.f).join("")}</g></svg>`;
}
const POSES = ["stand","arms-up","wave","run","sit"];

/* ---------- helpers ---------- */
function showHint(t, ms=2200){ hint.textContent=t; hint.style.opacity=1; clearTimeout(showHint._t); if(ms) showHint._t=setTimeout(()=>hint.style.opacity=0,ms); }
function haptic(){ if(navigator.vibrate) navigator.vibrate(8); }

/* ---------- camera ---------- */
function camFail(msg){ showHint(msg, 0); console.warn("[HIDEY cam]", msg); }
async function startCamera(){
  // secure-context / support checks (in-app browsers often lack these)
  if(!window.isSecureContext){ camFail("Ouvre le lien en HTTPS (barre Safari) pour activer la caméra."); return; }
  if(!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)){
    camFail("Caméra bloquée par ce navigateur. Ouvre le lien dans Safari (pas dans une app), ou choisis une photo 🖼️."); return;
  }
  showHint("Ouverture de la caméra…", 0);
  const tries = [
    { video:{ facingMode:{ ideal:facing } }, audio:false },  // preferred side
    { video:{ facingMode:facing }, audio:false },
    { video:true, audio:false }                              // any camera
  ];
  let lastErr;
  for(const constraints of tries){
    try{
      if(stream) stream.getTracks().forEach(t=>t.stop());
      stream = await navigator.mediaDevices.getUserMedia(constraints);
      cam.srcObject = stream;
      cam.style.display="block"; photo.style.display="none"; placeholder.style.display="none";
      try{ await cam.play(); }catch(_){}
      bgKind = "cam"; showControls();
      showHint("➕ Ajoute un bonhomme et cache-le");
      return;
    }catch(e){ lastErr=e; }
  }
  const n = lastErr && lastErr.name;
  if(n==="NotAllowedError") camFail("Accès caméra refusé. Réglages → Safari → Appareil photo → Autoriser, puis recharge. Ou choisis une photo 🖼️.");
  else if(n==="NotFoundError"||n==="OverconstrainedError") camFail("Aucune caméra utilisable — choisis une photo 🖼️.");
  else if(n==="NotReadableError") camFail("Caméra occupée par une autre app — ferme-la et réessaie.");
  else camFail("Caméra indisponible (souvent : lien ouvert dans une app). Ouvre-le dans Safari, ou choisis une photo 🖼️.");
}
function usePhoto(file){
  const url = URL.createObjectURL(file);
  photo.onload = ()=>{ URL.revokeObjectURL(url); };
  photo.src = url; bgKind="photo"; photo.style.display="block"; cam.style.display="none"; placeholder.style.display="none";
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  showControls();
  showHint("➕ Ajoute un bonhomme et cache-le");
}

/* ---------- figures ---------- */
function addFigure(pose="stand"){
  const el = document.createElement("div");
  el.className="fig"; el.innerHTML=figureSVG(pose);
  const baseW=90, baseH=180;
  const f = { el, x:stage.clientWidth/2, y:stage.clientHeight/2, scale:1, rot:0, flip:false, pose, baseW, baseH };
  el.style.width=baseW+"px"; el.style.height=baseH+"px";
  figLayer.appendChild(el);
  figures.push(f); select(f); layout(f);
  attachDrag(f);
  showHint("Glisse-le à l'endroit parfait 🎯");
  haptic();
}
function layout(f){
  f.el.style.left=f.x+"px"; f.el.style.top=f.y+"px";
  f.el.style.transform=`translate(-50%,-50%) rotate(${f.rot}deg) scale(${f.scale}) scaleX(${f.flip?-1:1})`;
}
function select(f){
  selected=f;
  figures.forEach(g=>g.el.classList.toggle("selected", g===f));
  figbar.style.display = f ? "flex" : "none";
}
function attachDrag(f){
  let sx,sy,ox,oy,drag=false;
  f.el.addEventListener("pointerdown", e=>{
    if(mode!=="compose") return;
    e.preventDefault(); select(f); drag=true; f.el.setPointerCapture(e.pointerId);
    sx=e.clientX; sy=e.clientY; ox=f.x; oy=f.y; f.el.style.cursor="grabbing";
  });
  f.el.addEventListener("pointermove", e=>{
    if(!drag) return;
    const r=stage.getBoundingClientRect();
    f.x=Math.max(0,Math.min(r.width, ox+(e.clientX-sx)));
    f.y=Math.max(0,Math.min(r.height, oy+(e.clientY-sy)));
    layout(f);
  });
  const end=e=>{ drag=false; f.el.style.cursor="grab"; };
  f.el.addEventListener("pointerup",end); f.el.addEventListener("pointercancel",end);
}

/* figbar actions */
figbar.addEventListener("click", e=>{
  const b=e.target.closest("button"); if(!b||!selected) return;
  const a=b.dataset.fig, f=selected;
  if(a==="bigger") f.scale=Math.min(4, f.scale*1.12);
  else if(a==="smaller") f.scale=Math.max(0.25, f.scale/1.12);
  else if(a==="rotL") f.rot-=8;
  else if(a==="rotR") f.rot+=8;
  else if(a==="flip") f.flip=!f.flip;
  else if(a==="pose"){ f.pose=POSES[(POSES.indexOf(f.pose)+1)%POSES.length]; f.el.innerHTML=figureSVG(f.pose); }
  else if(a==="del"){ f.el.remove(); figures=figures.filter(g=>g!==f); select(null); return; }
  layout(f); haptic();
});

/* deselect on empty stage tap (compose) */
stage.addEventListener("pointerdown", e=>{
  if(mode==="compose" && !e.target.closest(".fig")) select(null);
});

/* ---------- capture : freeze bg + figures into <canvas> ---------- */
function drawCover(src, sw, sh){
  const cw=board.width, ch=board.height;
  const sr=sw/sh, dr=cw/ch; let rw,rh,rx,ry;
  if(sr>dr){ rh=sh; rw=sh*dr; rx=(sw-rw)/2; ry=0; } else { rw=sw; rh=sw/dr; rx=0; ry=(sh-rh)/2; }
  ctx.drawImage(src, rx,ry,rw,rh, 0,0,cw,ch);
}
async function figureToImage(f){
  const svg = figureSVG(f.pose);
  const url = "data:image/svg+xml;charset=utf-8,"+encodeURIComponent(svg);
  return await new Promise(res=>{ const im=new Image(); im.onload=()=>res(im); im.src=url; });
}
async function capture(){
  const w=stage.clientWidth, h=stage.clientHeight;
  board.width=Math.round(w*dpr); board.height=Math.round(h*dpr);
  board.style.display="block";
  // background
  if(bgKind==="cam" && cam.videoWidth) drawCover(cam, cam.videoWidth, cam.videoHeight);
  else if(bgKind==="photo" && photo.naturalWidth) drawCover(photo, photo.naturalWidth, photo.naturalHeight);
  else { ctx.fillStyle="#223"; ctx.fillRect(0,0,board.width,board.height); }
  // figures
  for(const f of figures){
    const im=await figureToImage(f);
    const w2=f.baseW*f.scale*dpr, h2=f.baseH*f.scale*dpr;
    ctx.save();
    ctx.translate(f.x*dpr, f.y*dpr);
    ctx.rotate(f.rot*Math.PI/180);
    ctx.scale(f.flip?-1:1,1);
    ctx.drawImage(im, -w2/2, -h2/2, w2, h2);
    ctx.restore();
  }
  // freeze visuals
  cam.style.display="none"; photo.style.display="none"; figLayer.style.display="none";
  select(null); figbar.style.display="none";
  mode="paint"; composeUI.style.display="none"; paintUI.style.display="block";
  pushUndo();
  showHint("💧 Pipette une couleur du décor, puis peins sur le bonhomme");
}

/* ---------- painting ---------- */
let paintColor="#8a7f6a", brush=22, painting=false, eyedrop=false;
const undoStack=[];
function pushUndo(){ try{ undoStack.push(ctx.getImageData(0,0,board.width,board.height)); if(undoStack.length>12) undoStack.shift(); }catch(e){} }

function stagePointToCanvas(e){
  const r=board.getBoundingClientRect();
  return { x:(e.clientX-r.left)*(board.width/r.width), y:(e.clientY-r.top)*(board.height/r.height) };
}
function paintAt(p){
  ctx.globalCompositeOperation="source-over";
  ctx.fillStyle=paintColor; ctx.strokeStyle=paintColor;
  ctx.lineWidth=brush*dpr; ctx.lineCap="round"; ctx.lineJoin="round";
  if(paintAt._last){ ctx.beginPath(); ctx.moveTo(paintAt._last.x,paintAt._last.y); ctx.lineTo(p.x,p.y); ctx.stroke(); }
  ctx.beginPath(); ctx.arc(p.x,p.y,(brush*dpr)/2,0,7); ctx.fill();
  paintAt._last=p;
}
function pickAt(p){
  const d=ctx.getImageData(Math.max(0,Math.min(board.width-1,p.x|0)), Math.max(0,Math.min(board.height-1,p.y|0)),1,1).data;
  paintColor=`rgb(${d[0]},${d[1]},${d[2]})`;
  document.querySelectorAll(".sw").forEach(s=>s.classList.remove("active"));
  return paintColor;
}
function showLoupe(e,p){
  loupe.style.display="block";
  loupe.style.left=e.clientX+"px"; loupe.style.top=e.clientY+"px";
  const size=180; // sample area in canvas px
  loupe.style.backgroundImage=`url(${board.toDataURL?"":""})`; // avoid heavy re-encode: use color swatch instead
  loupe.style.background=pickAt(p);
}
board.addEventListener("pointerdown", e=>{
  if(mode!=="paint") return; e.preventDefault(); board.setPointerCapture(e.pointerId);
  const p=stagePointToCanvas(e);
  if(eyedrop){ showLoupe(e,p); return; }
  pushUndo(); painting=true; paintAt._last=null; paintAt(p);
});
board.addEventListener("pointermove", e=>{
  if(mode!=="paint") return;
  const p=stagePointToCanvas(e);
  if(eyedrop && (e.buttons||e.pressure)){ showLoupe(e,p); return; }
  if(painting) paintAt(p);
});
function endPaint(){ if(eyedrop){ eyedrop=false; $("#eyedrop").classList.remove("active"); loupe.style.display="none"; showHint("Couleur chopée 🎯 peins le bonhomme"); } painting=false; paintAt._last=null; }
board.addEventListener("pointerup",endPaint); board.addEventListener("pointercancel",endPaint);

/* ---------- palette UI ---------- */
const PRESETS=["#7c6f57","#4a5d3a","#2f3b2a","#6b6b6b","#9aa0a6","#2b2b2b","#c9b48a","#3a4a5a","#e8e0d0","#5a4632"];
function buildSwatches(){
  const wrap=$("#swatches"); wrap.innerHTML="";
  const eye=document.createElement("div"); eye.id="eyedrop"; eye.className="sw active"; eye.textContent="💧"; eye.style.display="flex"; eye.style.alignItems="center"; eye.style.justifyContent="center"; eye.style.fontSize="16px";
  eye.onclick=()=>{ eyedrop=true; document.querySelectorAll(".sw").forEach(s=>s.classList.remove("active")); eye.classList.add("active"); showHint("Touche le décor pour choper sa couleur"); };
  wrap.appendChild(eye);
  PRESETS.forEach(c=>{ const s=document.createElement("div"); s.className="sw"; s.style.background=c;
    s.onclick=()=>{ paintColor=c; eyedrop=false; document.querySelectorAll(".sw").forEach(x=>x.classList.remove("active")); s.classList.add("active"); }; wrap.appendChild(s); });
  const pick=document.createElement("label"); pick.className="sw picker";
  const inp=document.createElement("input"); inp.type="color"; inp.value="#8a7f6a";
  inp.oninput=e=>{ paintColor=e.target.value; eyedrop=false; document.querySelectorAll(".sw").forEach(x=>x.classList.remove("active")); pick.classList.add("active"); };
  pick.appendChild(inp); wrap.appendChild(pick);
}
document.querySelectorAll(".bsz").forEach(b=>b.onclick=()=>{ brush=+b.dataset.sz; document.querySelectorAll(".bsz").forEach(x=>x.classList.remove("active")); b.classList.add("active"); });

/* ---------- share / save ---------- */
function frameForShare(){
  // export current board with a subtle caption bar → returns canvas
  const out=document.createElement("canvas"); out.width=board.width; out.height=board.height;
  const c=out.getContext("2d"); c.drawImage(board,0,0);
  const barH=Math.round(96*dpr);
  const g=c.createLinearGradient(0,out.height-barH,0,out.height);
  g.addColorStop(0,"rgba(0,0,0,0)"); g.addColorStop(1,"rgba(0,0,0,.75)");
  c.fillStyle=g; c.fillRect(0,out.height-barH,out.width,barH);
  c.fillStyle="#fff"; c.textAlign="center"; c.font=`800 ${Math.round(30*dpr)}px -apple-system,sans-serif`;
  c.fillText("Tu me trouves ? 🦎", out.width/2, out.height-Math.round(38*dpr));
  c.font=`600 ${Math.round(15*dpr)}px -apple-system,sans-serif`; c.fillStyle="rgba(255,255,255,.7)";
  c.fillText("fait avec HIDEY", out.width/2, out.height-Math.round(14*dpr));
  return out;
}
async function boardBlob(){ return await new Promise(r=>frameForShare().toBlob(r,"image/png")); }
async function share(){
  const blob=await boardBlob();
  const file=new File([blob],"hidey.png",{type:"image/png"});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({ files:[file], title:"Tu me trouves ?", text:"Trouve le petit bonhomme caché 🦎 #HIDEY" }); return; }catch(e){ if(e.name==="AbortError") return; }
  }
  saveImg(blob); showHint("Partage natif indispo → image enregistrée",3000);
}
function saveImg(blob){
  const b=blob||null;
  const dl=url=>{ const a=document.createElement("a"); a.href=url; a.download="hidey.png"; a.click(); };
  if(b){ const u=URL.createObjectURL(b); dl(u); setTimeout(()=>URL.revokeObjectURL(u),4000); }
  else frameForShare().toBlob(x=>{ const u=URL.createObjectURL(x); dl(u); setTimeout(()=>URL.revokeObjectURL(u),4000); });
}

/* ---------- wire buttons ---------- */
$("#startCam").onclick=startCamera;
$("#startPhoto").onclick=()=>$("#fileInput").click();
$("#btnFlipCam").onclick=()=>{ facing=facing==="environment"?"user":"environment"; startCamera(); };
$("#btnPhoto").onclick=()=>$("#fileInput").click();
$("#btnAdd").onclick=()=>{ if(!bgKind){ showHint("Ouvre d'abord la caméra ou une photo"); return;} addFigure("stand"); };
$("#btnPose").onclick=()=>{ if(selected){ selected.pose=POSES[(POSES.indexOf(selected.pose)+1)%POSES.length]; selected.el.innerHTML=figureSVG(selected.pose);} else addFigure(POSES[Math.floor(Math.random()*POSES.length)]); };
$("#btnCapture").onclick=()=>{ if(!bgKind){ showHint("Rien à capturer — ouvre la caméra"); return;} if(!figures.length){ showHint("Ajoute au moins un bonhomme 😉"); return;} capture(); };
$("#fileInput").onchange=e=>{ if(e.target.files[0]) usePhoto(e.target.files[0]); e.target.value=""; };
$("#btnUndo").onclick=()=>{ if(undoStack.length>1){ undoStack.pop(); ctx.putImageData(undoStack[undoStack.length-1],0,0);} };
$("#btnClear").onclick=()=>{ if(undoStack.length){ ctx.putImageData(undoStack[0],0,0); } };
$("#btnBack").onclick=()=>{ // back to compose
  mode="compose"; paintUI.style.display="none"; composeUI.style.display="block"; board.style.display="none";
  figLayer.style.display="block"; undoStack.length=0;
  if(bgKind==="cam") cam.style.display="block"; else photo.style.display="block";
  showHint("Repositionne, puis re-capture");
};
$("#btnShare").onclick=share;
$("#btnSave").onclick=()=>saveImg(null);

buildSwatches();
window.addEventListener("resize", ()=>{ dpr=Math.max(1,Math.min(3,window.devicePixelRatio||1)); });

/* the bottom bar (Add / Capture…) only appears once a background is loaded,
   so nobody taps "Capturer la scène" on an empty stage */
function showControls(){ document.getElementById("controls").style.display="block"; }
document.getElementById("controls").style.display="none";

/* iPhone + non-Safari (Chrome/Firefox/Edge on iOS) can't access the web camera */
(function(){
  const ua=navigator.userAgent||"";
  const isIOS=/iPad|iPhone|iPod/.test(ua)||(navigator.platform==="MacIntel"&&navigator.maxTouchPoints>1);
  if(isIOS && /CriOS|FxiOS|EdgiOS/.test(ua)){
    const b=document.createElement("div");
    b.style.cssText="margin-top:12px;font-size:12.5px;line-height:1.45;color:#ffd27c;background:rgba(255,180,60,.12);border:1px solid rgba(255,180,60,.35);padding:9px 13px;border-radius:12px;max-width:300px;";
    b.innerHTML="⚠️ Sur iPhone, la caméra ne marche que dans <b>Safari</b>. Ouvre ce lien dans Safari — ou tape « choisir une photo » pour tester tout de suite.";
    placeholder.appendChild(b);
  }
})();

/* debug bridge (only with ?debug) — used for headless preview testing, no-op for users */
if(location.search.includes("debug")){
  window.HIDEY={ addFigure, capture, figures, figureSVG,
    setBg:(url)=>{ photo.onload=()=>placeholder.style.display="none"; photo.src=url; bgKind="photo"; photo.style.display="block"; cam.style.display="none"; },
    paintStroke:(pts)=>{ pushUndo(); painting=true; paintAt._last=null; pts.forEach(p=>paintAt({x:p.x*dpr,y:p.y*dpr})); painting=false; paintAt._last=null; },
    setColor:(c)=>{ paintColor=c; } };
}
</script>
