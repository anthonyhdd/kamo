<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#05060a" />
<meta name="robots" content="noindex,nofollow" />
<title>KAMO — spot the hidden one</title>
<style>
  :root{
    --bg:#05060a; --panel:rgba(16,16,24,.72); --stroke:rgba(255,255,255,.14);
    --accent:#39e6a4; --accent2:#7c5cff; --text:#f4f4f8;
    --safe-b: env(safe-area-inset-bottom, 0px); --safe-t: env(safe-area-inset-top, 0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro",Inter,system-ui,sans-serif;
    overflow:hidden;overscroll-behavior:none;touch-action:none;}
  #app{position:fixed;inset:0;}

  /* ---------- STAGE ---------- */
  #stage{position:absolute;inset:0;overflow:hidden;background:#111;}
  #cam,#photo,#board{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;}
  #gl{position:absolute;inset:0;width:100%;height:100%;display:none;touch-action:none;}
  #board{touch-action:none;}

  /* ---------- START OVERLAY ---------- */
  #start{position:absolute;inset:0;z-index:30;overflow:hidden;background:#05060a;}
  #slideshow{position:absolute;inset:0;overflow:hidden;
    background:radial-gradient(120% 120% at 50% 20%,#1b2a3a,#05060a 70%);}
  #slideshow .slide{position:absolute;inset:0;background-size:cover;background-position:center;
    opacity:0;transition:opacity 1.3s ease;will-change:opacity,transform;}
  #slideshow .slide.active{opacity:1;animation:kb 6s ease-out both;}
  @keyframes kb{from{transform:scale(1.03)}to{transform:scale(1.13)}}
  .startScrim{position:absolute;inset:0;z-index:2;pointer-events:none;
    background:linear-gradient(180deg,rgba(0,0,0,.42) 0%,rgba(0,0,0,0) 26%,rgba(0,0,0,0) 50%,rgba(5,6,10,.9) 100%);}
  .startTop{position:absolute;z-index:3;top:calc(18px + var(--safe-t));left:0;right:0;display:flex;justify-content:center;}
  .startTop .logo{font-weight:900;letter-spacing:2.5px;font-size:21px;text-shadow:0 2px 14px rgba(0,0,0,.7);}
  .startTop .logo b{color:var(--accent);}
  .startBottom{position:absolute;z-index:3;left:0;right:0;bottom:calc(30px + var(--safe-b));
    display:flex;flex-direction:column;align-items:center;gap:16px;padding:0 24px;}
  .startTag{text-align:center;font-size:29px;font-weight:800;letter-spacing:-.4px;line-height:1.12;
    text-shadow:0 2px 18px rgba(0,0,0,.9);max-width:330px;}
  .startTag b{color:var(--accent);}
  /* Instagram-style floating reactions */
  #reactions{position:absolute;inset:0;z-index:2;pointer-events:none;overflow:hidden;}
  .reaction{position:absolute;bottom:24%;will-change:transform,opacity;
    filter:drop-shadow(0 3px 7px rgba(0,0,0,.45));animation:floatUp var(--d,2.6s) cubic-bezier(.25,.6,.3,1) forwards;}
  @keyframes floatUp{
    0%{transform:translateY(26px) scale(.35);opacity:0}
    15%{opacity:1;transform:translateY(0) scale(1.18)}
    30%{transform:translateY(-24px) scale(1)}
    100%{transform:translateY(-240px) translateX(var(--dx,0)) rotate(var(--rot,0deg)) scale(.95);opacity:0}}
  .startHint{font-size:11px;letter-spacing:2px;text-transform:uppercase;opacity:.6;margin-top:-4px;}
  .dots{display:flex;gap:6px;margin-top:2px;}
  .dots i{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.35);transition:.3s;}
  .dots i.on{background:var(--accent);width:16px;border-radius:3px;}
  .cta{margin-top:8px;border:none;border-radius:18px;padding:0 26px;height:58px;font-size:17px;font-weight:800;
    background:linear-gradient(135deg,var(--accent),#28c99b);color:#04241a;cursor:pointer;
    box-shadow:0 12px 40px rgba(57,230,164,.35);transition:transform .08s;}
  .cta:active{transform:scale(.96);}
  .mini{background:none;border:none;color:rgba(255,255,255,.55);font-size:13px;text-decoration:underline;cursor:pointer;padding:6px;}

  .brand{position:absolute;top:calc(14px + var(--safe-t));left:18px;z-index:12;font-weight:900;letter-spacing:1.5px;
    font-size:15px;opacity:.9;text-shadow:0 2px 10px rgba(0,0,0,.7);pointer-events:none;}
  .brand b{color:var(--accent);}
  #flip{position:absolute;top:calc(10px + var(--safe-t));right:14px;z-index:12;width:44px;height:44px;border-radius:50%;
    border:1px solid var(--stroke);background:var(--panel);backdrop-filter:blur(12px);color:#fff;display:none;
    align-items:center;justify-content:center;cursor:pointer;transition:transform .15s;}
  #flip svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:transform .45s cubic-bezier(.4,1.3,.5,1);}
  #flip:active{transform:scale(.9);}
  #flip:active svg{transform:rotate(180deg);}

  .hint{position:absolute;top:calc(14px + var(--safe-t));left:50%;transform:translateX(-50%);z-index:12;
    background:var(--panel);backdrop-filter:blur(14px);border:1px solid var(--stroke);
    padding:8px 15px;border-radius:999px;font-size:12.5px;white-space:nowrap;max-width:88vw;overflow:hidden;text-overflow:ellipsis;
    box-shadow:0 6px 24px rgba(0,0,0,.45);pointer-events:none;opacity:0;transition:opacity .3s;}

  /* ---------- SHUTTER (state of the art) ---------- */
  #shutterWrap{position:absolute;left:50%;bottom:calc(30px + var(--safe-b));transform:translateX(-50%);z-index:15;display:none;}
  .shutter{position:relative;width:82px;height:82px;border-radius:50%;border:none;background:transparent;cursor:pointer;padding:0;}
  .shutter .ring{position:absolute;inset:0;border-radius:50%;border:3px solid rgba(255,255,255,.9);
    box-shadow:0 0 0 1px rgba(0,0,0,.25) inset, 0 8px 30px rgba(0,0,0,.5);}
  .shutter .spin{position:absolute;inset:-6px;border-radius:50%;
    background:conic-gradient(from 0deg,var(--accent),var(--accent2),var(--accent));
    -webkit-mask:radial-gradient(circle, transparent 40px, #000 41px);mask:radial-gradient(circle, transparent 40px, #000 41px);
    opacity:.9;animation:spin 6s linear infinite;filter:blur(.3px);}
  .shutter .core{position:absolute;inset:9px;border-radius:50%;
    background:radial-gradient(circle at 38% 32%, #ffffff, #e9e9ee 60%, #cfcfd6);
    box-shadow:0 4px 14px rgba(0,0,0,.4), 0 0 22px rgba(57,230,164,.25);
    transition:transform .12s cubic-bezier(.3,1.4,.5,1);animation:breathe 3.4s ease-in-out infinite;}
  .shutter:active .core{transform:scale(.82);}
  .shutter:active .spin{animation-duration:1.2s;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes breathe{0%,100%{box-shadow:0 4px 14px rgba(0,0,0,.4),0 0 18px rgba(57,230,164,.20);}50%{box-shadow:0 4px 14px rgba(0,0,0,.4),0 0 30px rgba(57,230,164,.42);}}
  .capLabel{position:absolute;top:92px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:2px;
    opacity:.55;text-transform:uppercase;white-space:nowrap;}

  #flash{position:absolute;inset:0;z-index:40;background:#fff;opacity:0;pointer-events:none;}

  /* ---------- RADIAL POSE WHEEL ---------- */
  #wheel{position:absolute;inset:0;z-index:20;display:none;pointer-events:none;}
  .slice{position:absolute;width:66px;height:66px;transform:translate(-50%,-50%);border-radius:18px;
    background:var(--panel);backdrop-filter:blur(14px);border:1px solid var(--stroke);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
    box-shadow:0 8px 26px rgba(0,0,0,.5);transition:transform .12s, border-color .12s, background .12s;}
  .slice svg{width:26px;height:34px;display:block;}
  .slice small{font-size:8.5px;opacity:.7;}
  .slice.hot{transform:translate(-50%,-50%) scale(1.24);border-color:var(--accent);background:rgba(57,230,164,.2);}
  #wheelCenter{position:absolute;width:20px;height:20px;transform:translate(-50%,-50%);border-radius:50%;
    background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.6);}

  /* ---------- PAINT MODE ---------- */
  #paintUI{position:absolute;left:0;right:0;bottom:0;z-index:15;display:none;
    padding:10px 12px calc(12px + var(--safe-b));
    background:linear-gradient(180deg,rgba(5,6,10,0),rgba(5,6,10,.86) 32%,var(--bg));}
  .row{display:flex;gap:8px;align-items:center;justify-content:center;}
  #swatches{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 8px;scrollbar-width:none;}
  #swatches::-webkit-scrollbar{display:none;}
  .sw{flex:0 0 auto;width:34px;height:34px;border-radius:50%;border:2px solid rgba(255,255,255,.25);position:relative;cursor:pointer;}
  .sw.active{border-color:#fff;box-shadow:0 0 0 2px var(--accent);}
  .sw.picker{overflow:hidden;background:conic-gradient(red,#ff0,#0f0,#0ff,#00f,#f0f,red);}
  .sw.picker input{position:absolute;inset:0;opacity:0;width:100%;height:100%;border:none;}
  #eyedrop{display:flex;align-items:center;justify-content:center;}
  .sw svg{width:19px;height:19px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .bsz{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid var(--stroke);background:rgba(255,255,255,.06);cursor:pointer;}
  .bsz.active{border-color:var(--accent);background:rgba(57,230,164,.15);}
  .bsz i{display:block;border-radius:50%;background:#fff;}
  button.b{position:relative;overflow:hidden;border:1px solid var(--stroke);background:rgba(255,255,255,.07);color:var(--text);
    border-radius:16px;height:48px;padding:0 16px;font-size:14px;font-weight:650;letter-spacing:.2px;
    display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;backdrop-filter:blur(10px);
    transition:transform .12s cubic-bezier(.3,1.5,.5,1),background .2s,border-color .2s,color .2s;}
  button.b:active{transform:scale(.9);}
  button.b svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;display:block;}
  button.b.icon{width:48px;padding:0;border-radius:50%;}
  button.b.icon:active{background:rgba(57,230,164,.16);border-color:var(--accent);color:var(--accent);}
  button.b.primary{flex:1;height:56px;font-size:16px;font-weight:800;border:none;color:#fff;
    background:linear-gradient(135deg,var(--accent2),#5a3cff);box-shadow:0 10px 28px rgba(124,92,255,.42);}
  button.b.primary svg{width:20px;height:20px;stroke-width:2.4;}
  button.b.primary::after{content:"";position:absolute;top:0;left:-70%;width:45%;height:100%;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.45),transparent);transform:skewX(-18deg);animation:sheen 3.6s ease-in-out infinite;}
  @keyframes sheen{0%{left:-70%}55%,100%{left:175%}}
  .badge{font-size:11px;opacity:.55;text-align:center;margin-top:7px;}
  #loupe{position:absolute;width:64px;height:64px;border-radius:50%;border:3px solid #fff;z-index:22;
    box-shadow:0 4px 16px rgba(0,0,0,.6);display:none;pointer-events:none;transform:translate(-50%,-140%);}
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <video id="cam" playsinline autoplay muted></video>
    <img id="photo" alt="" />
    <canvas id="gl"></canvas>
    <canvas id="board"></canvas>
    <div id="flash"></div>

    <div class="brand">KA<b>MO</b></div>
    <button id="flip" title="Flip camera"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg></button>
    <div class="hint" id="hint"></div>

    <div id="wheel"><div id="wheelCenter"></div></div>
    <div id="loupe"></div>

    <div id="shutterWrap">
      <button id="shutter" class="shutter" aria-label="Capture">
        <div class="spin"></div>
        <div class="ring"></div>
        <div class="core"></div>
      </button>
      <div class="capLabel">Capture</div>
    </div>

    <!-- PAINT UI -->
    <div id="paintUI">
      <div id="swatches"></div>
      <div class="row" style="margin-top:2px">
        <div class="row" style="gap:8px">
          <button class="bsz" data-sz="10"><i style="width:8px;height:8px"></i></button>
          <button class="bsz active" data-sz="22"><i style="width:14px;height:14px"></i></button>
          <button class="bsz" data-sz="44"><i style="width:22px;height:22px"></i></button>
        </div>
        <button class="b icon" id="btnUndo" title="Annuler"><svg viewBox="0 0 24 24"><path d="M9 7L4 12l5 5"/><path d="M4 12h11a5 5 0 0 1 0 10h-2"/></svg></button>
        <button class="b icon" id="btnClear" title="Tout effacer"><svg viewBox="0 0 24 24"><path d="M4 15.5l6-6 8 8-4.5 4.5H8z"/><path d="M12.5 21H21"/><path d="M9 9l3-3"/></svg></button>
      </div>
      <div class="row" style="margin-top:8px">
        <button class="b ghost" id="btnBack"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>Retake</button>
        <button class="b primary" id="btnShare"><svg viewBox="0 0 24 24"><path d="M12 15V3"/><path d="M8 7l4-4 4 4"/><path d="M5 12v7a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-7"/></svg>Share it</button>
        <button class="b icon" id="btnSave" title="Enregistrer"><svg viewBox="0 0 24 24"><path d="M12 3v12"/><path d="M8 11l4 4 4-4"/><path d="M5 20h14"/></svg></button>
      </div>
      <div class="badge">Eyedropper = the exact scene color → perfect camo</div>
    </div>

    <!-- START (home) -->
    <div id="start">
      <div id="slideshow">
        <div class="slide" data-src="assets/home-1.jpg"></div>
        <div class="slide" data-src="assets/home-2.jpg"></div>
        <div class="slide" data-src="assets/home-3.jpg"></div>
      </div>
      <div id="reactions"></div>
      <div class="startScrim"></div>
      <div class="startTop"><div class="logo">KA<b>MO</b> 🦎</div></div>
      <div class="startBottom">
        <div class="startTag">Hide in plain sight.</div>
        <div class="dots" id="dots"></div>
        <button id="startBtn" class="shutter" aria-label="Open camera">
          <div class="spin"></div><div class="ring"></div><div class="core"></div>
        </button>
        <button class="mini" id="startPhoto">or pick a photo</button>
      </div>
    </div>
  </div>
</div>
<input type="file" accept="image/*" id="fileInput" style="display:none" />

<script type="importmap">
{ "imports": { "three": "./vendor/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

const $=s=>document.querySelector(s);
const stage=$("#stage"), cam=$("#cam"), photo=$("#photo"), glCanvas=$("#gl"), board=$("#board");
const startEl=$("#start"), hintEl=$("#hint"), shutterWrap=$("#shutterWrap"), flipBtn=$("#flip");
const wheelEl=$("#wheel"), wheelCenter=$("#wheelCenter"), flashEl=$("#flash");
const ctx=board.getContext("2d",{willReadFrequently:true});
let dpr=Math.max(1,Math.min(3,window.devicePixelRatio||1));
let mode="compose", bgKind=null, facing="environment", stream=null;

function showHint(t,ms=2600){ hintEl.textContent=t; hintEl.style.opacity=t?1:0; clearTimeout(showHint._t); if(t&&ms) showHint._t=setTimeout(()=>hintEl.style.opacity=0,ms); }
function haptic(ms=8){ if(navigator.vibrate) navigator.vibrate(ms); }

/* ===== THREE.JS — white articulated mannequin over the camera ===== */
let renderer, scene, camera3, root, charG, parts={}, blob;
function initThree(){
  renderer=new THREE.WebGLRenderer({canvas:glCanvas, alpha:true, antialias:true, preserveDrawingBuffer:true});
  renderer.setClearColor(0x000000,0); renderer.outputColorSpace=THREE.SRGBColorSpace;
  scene=new THREE.Scene();
  camera3=new THREE.PerspectiveCamera(42,1,0.1,100);
  camera3.position.set(0,1.18,7.3); camera3.lookAt(0,1.18,0);  // pulled back: smaller mannequin, dead-centered on screen
  scene.add(new THREE.HemisphereLight(0xffffff,0x555566,1.15));
  const dir=new THREE.DirectionalLight(0xffffff,1.5); dir.position.set(3.5,6,4); scene.add(dir);
  const rim=new THREE.DirectionalLight(0xbfdfff,0.5); rim.position.set(-4,2,-3); scene.add(rim);
  root=new THREE.Group(); scene.add(root);
  buildCharacter(); buildBlobShadow(); resize3(); animate();
}
const WHITE=()=>new THREE.MeshStandardMaterial({color:0xf6f6f8,roughness:.82,metalness:0});
function capsule(r,len){ return new THREE.Mesh(new THREE.CapsuleGeometry(r,len,6,16),WHITE()); }
function pivot(x,y,z){ const g=new THREE.Group(); g.position.set(x,y,z); return g; }

function buildCharacter(){
  charG=new THREE.Group(); root.add(charG);
  const spine=pivot(0,1.0,0); charG.add(spine); parts.spine=spine;
  const torso=capsule(0.34,0.62); torso.position.y=0.36; spine.add(torso);
  const shoulders=pivot(0,0.72,0); spine.add(shoulders);
  const head=pivot(0,0,0); shoulders.add(head); parts.head=head;
  const headMesh=new THREE.Mesh(new THREE.SphereGeometry(0.32,24,20),WHITE()); headMesh.position.y=0.34; head.add(headMesh);
  function arm(side){
    const sh=pivot(0.30*side,-0.02,0); shoulders.add(sh);
    const up=capsule(0.145,0.40); up.position.y=-0.24; sh.add(up);
    const el=pivot(0,-0.46,0); sh.add(el);
    const lo=capsule(0.13,0.38); lo.position.y=-0.23; el.add(lo);
    return {sh,el};
  }
  const aL=arm(1), aR=arm(-1);
  parts.shL=aL.sh; parts.elL=aL.el; parts.shR=aR.sh; parts.elR=aR.el;
  function leg(side){
    const hip=pivot(0.17*side,1.0,0); charG.add(hip);
    const up=capsule(0.16,0.44); up.position.y=-0.27; hip.add(up);
    const kn=pivot(0,-0.52,0); hip.add(kn);
    const lo=capsule(0.145,0.42); lo.position.y=-0.26; kn.add(lo);
    const foot=new THREE.Mesh(new THREE.SphereGeometry(0.15,16,12),WHITE()); foot.scale.set(1,.6,1.5); foot.position.set(0,-0.5,0.06); kn.add(foot);
    return {hip,kn};
  }
  const lL=leg(1), lR=leg(-1);
  parts.hipL=lL.hip; parts.knL=lL.kn; parts.hipR=lR.hip; parts.knR=lR.kn;
  applyPoseInstant(0);
}
function buildBlobShadow(){
  const c=document.createElement("canvas"); c.width=c.height=128; const x=c.getContext("2d");
  const g=x.createRadialGradient(64,64,4,64,64,62); g.addColorStop(0,"rgba(0,0,0,.55)"); g.addColorStop(1,"rgba(0,0,0,0)");
  x.fillStyle=g; x.fillRect(0,0,128,128);
  blob=new THREE.Mesh(new THREE.PlaneGeometry(1.7,1.7),new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(c),transparent:true,depthWrite:false}));
  blob.rotation.x=-Math.PI/2; blob.position.y=0.01; root.add(blob);
}

const REST={spine:[0,0,0],head:[0,0,0],shL:[0,0,.14],shR:[0,0,-.14],elL:[0,0,0],elR:[0,0,0],hipL:[0,0,0],hipR:[0,0,0],knL:[0,0,0],knR:[0,0,0],rootDY:0};
const POSES=[
  {label:"Stand", p:{}},
  {label:"Wave", p:{shR:[0,0,-2.55],elR:[.7,0,0]}},
  {label:"Arms up", p:{shL:[0,0,2.5],shR:[0,0,-2.5]}},
  {label:"Sit", p:{hipL:[-1.55,0,.06],hipR:[-1.55,0,-.06],knL:[1.6,0,0],knR:[1.6,0,0],shL:[.35,0,.16],shR:[.35,0,-.16],rootDY:-.42}},
  {label:"Run", p:{spine:[.2,0,0],shL:[1.0,0,.12],shR:[-1.0,0,-.12],elL:[.8,0,0],elR:[.8,0,0],hipL:[-.85,0,.05],hipR:[.75,0,-.05],knL:[.9,0,0],knR:[.35,0,0]}},
  {label:"Point", p:{shR:[-1.3,0,-.12],elR:[.15,0,0]}},
];
let poseIdx=0, target={};
function fullPose(i){ const o=JSON.parse(JSON.stringify(REST)); const p=POSES[i].p; for(const k in p) o[k]=p[k]; return o; }
function applyPose(i){ poseIdx=(i%POSES.length+POSES.length)%POSES.length; target=fullPose(poseIdx); haptic(); showHint(POSES[poseIdx].label); }
function applyPoseInstant(i){ applyPose(i); for(const k in REST){ if(k==="rootDY"){ charG.position.y=target.rootDY; continue;} parts[k].rotation.set(target[k][0],target[k][1],target[k][2]); } }
function lerpToTarget(){
  const s=0.18;
  for(const k in REST){
    if(k==="rootDY"){ charG.position.y += (target.rootDY-charG.position.y)*s; continue; }
    const r=parts[k].rotation, t=target[k]; r.x+=(t[0]-r.x)*s; r.y+=(t[1]-r.y)*s; r.z+=(t[2]-r.z)*s;
  }
}
function resize3(){ const w=stage.clientWidth,h=stage.clientHeight; renderer.setPixelRatio(dpr); renderer.setSize(w,h,false); camera3.aspect=w/h; camera3.updateProjectionMatrix(); }
function animate(){ requestAnimationFrame(animate); if(mode!=="compose"||!renderer) return; lerpToTarget(); renderer.render(scene,camera3); }

/* ===== CAMERA ===== */
function camFail(msg){ showHint(msg,0); console.warn("[cam]",msg); }
async function startCamera(){
  const onStart=startEl.style.display!=="none";
  if(!window.isSecureContext){ camFail("Open the link over HTTPS (Safari) for the camera."); return; }
  if(!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia)){ camFail("Camera blocked by this browser. Open in Safari, or pick a photo."); return; }
  const tries=[{video:{facingMode:{ideal:facing}},audio:false},{video:{facingMode:facing},audio:false},{video:true,audio:false}];
  let lastErr;
  for(const c of tries){ try{ if(stream) stream.getTracks().forEach(t=>t.stop()); stream=await navigator.mediaDevices.getUserMedia(c); cam.srcObject=stream; cam.style.display="block"; photo.style.display="none"; try{await cam.play();}catch(_){} bgKind="cam"; enterCompose(); return; }catch(e){ lastErr=e; } }
  const n=lastErr&&lastErr.name;
  if(n==="NotAllowedError") camFail("Camera access denied. Settings → Safari → Camera → Allow. Or pick a photo.");
  else if(n==="NotFoundError"||n==="OverconstrainedError") camFail("No camera — pick a photo.");
  else camFail("Camera unavailable. Open in Safari, or pick a photo.");
}
function usePhoto(file){ const url=URL.createObjectURL(file); photo.onload=()=>URL.revokeObjectURL(url); photo.src=url; photo.style.display="block"; cam.style.display="none"; if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;} bgKind="photo"; enterCompose(); }

function enterCompose(){
  mode="compose"; startEl.style.display="none"; glCanvas.style.display="block"; board.style.display="none";
  shutterWrap.style.display="block"; $("#paintUI").style.display="none"; flipBtn.style.display=(bgKind==="cam")?"flex":"none";
  root.position.set(0,0,0); root.scale.setScalar(1); applyPoseInstant(0);
  showHint("Tap to change pose · hold for all poses");
}

/* ===== GESTURES (tap=next pose • drag=move • pinch=scale • long-press=wheel) ===== */
const pointers=new Map();
let downT=0, downX=0, downY=0, moved=false, dragging=false, pinchStart=0, scaleStart=1, lpTimer=null, wheelOpen=false;
const plane=new THREE.Plane(new THREE.Vector3(0,0,1),0);
const ray=new THREE.Raycaster();
function screenToWorld(cx,cy){ const r=stage.getBoundingClientRect();
  const ndc=new THREE.Vector2(((cx-r.left)/r.width)*2-1, -(((cy-r.top)/r.height)*2-1));
  ray.setFromCamera(ndc,camera3); const pt=new THREE.Vector3(); plane.constant=-root.position.z; ray.ray.intersectPlane(plane,pt); return pt; }
let dragStartWorld=null, dragStartPos=null;
function onDown(e){
  if(mode!=="compose") return; glCanvas.setPointerCapture?.(e.pointerId);
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pointers.size===1){ downT=performance.now(); downX=e.clientX; downY=e.clientY; moved=false; dragging=false; lpTimer=setTimeout(()=>openWheel(downX,downY),480); }
  else if(pointers.size===2){ clearTimeout(lpTimer); const p=[...pointers.values()]; pinchStart=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y)||1; scaleStart=root.scale.x; }
}
function onMove(e){
  if(!pointers.has(e.pointerId)) return; pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(wheelOpen){ updateWheel(e.clientX,e.clientY); return; }
  const dx=e.clientX-downX, dy=e.clientY-downY;
  if(pointers.size>=2){ clearTimeout(lpTimer); const p=[...pointers.values()]; const d=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y); root.scale.setScalar(Math.max(0.35,Math.min(3.2,scaleStart*(d/pinchStart)))); return; }
  if(!moved && Math.hypot(dx,dy)>10){ moved=true; clearTimeout(lpTimer); dragging=true; dragStartWorld=screenToWorld(e.clientX,e.clientY); dragStartPos=root.position.clone(); }
  if(dragging){ const w=screenToWorld(e.clientX,e.clientY); root.position.x=dragStartPos.x+(w.x-dragStartWorld.x); root.position.y=Math.max(-1.2,Math.min(2.2,dragStartPos.y+(w.y-dragStartWorld.y))); }
}
function onUp(e){
  clearTimeout(lpTimer); pointers.delete(e.pointerId);
  if(wheelOpen){ closeWheel(true); return; }
  if(!moved && performance.now()-downT<450 && mode==="compose" && pointers.size===0) applyPose(poseIdx+1);
  if(pointers.size===0) dragging=false;
}
glCanvas.addEventListener("pointerdown",onDown);
glCanvas.addEventListener("pointermove",onMove);
glCanvas.addEventListener("pointerup",onUp);
glCanvas.addEventListener("pointercancel",onUp);

/* ---- radial pose wheel ---- */
let wheelSlices=[], wheelHot=-1, wheelCx=0, wheelCy=0;
function miniSVG(i){
  const a={0:"stand",1:"wave",2:"up",3:"sit",4:"run",5:"point"}[i];
  const L=(x1,y1,x2,y2)=>`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#fff" stroke-width="7" stroke-linecap="round"/>`;
  const H=`<circle cx="50" cy="26" r="14" fill="#fff"/>`;
  const b={stand:L(50,40,50,120)+L(50,60,28,96)+L(50,60,72,96)+L(50,120,34,178)+L(50,120,66,178),
    wave:L(50,40,50,120)+L(50,58,80,26)+L(50,64,30,96)+L(50,120,34,178)+L(50,120,66,178),
    up:L(50,40,50,120)+L(50,56,24,24)+L(50,56,76,24)+L(50,120,34,178)+L(50,120,66,178),
    sit:L(50,44,50,104)+L(50,64,28,96)+L(50,64,72,96)+L(50,104,24,104)+L(24,104,24,150)+L(50,104,76,104)+L(76,104,76,150),
    run:L(52,42,46,120)+L(52,64,84,50)+L(52,66,24,84)+L(46,120,24,152)+L(46,120,78,168),
    point:L(50,40,50,120)+L(50,60,86,52)+L(50,64,30,96)+L(50,120,34,178)+L(50,120,66,178)}[a];
  return `<svg viewBox="0 0 100 190">${H}${b}</svg>`;
}
function openWheel(cx,cy){
  wheelOpen=true; wheelHot=-1; haptic(14);
  const r=stage.getBoundingClientRect();
  let lx=Math.max(120,Math.min(r.width-120,cx-r.left)), ly=Math.max(150,Math.min(r.height-150,cy-r.top));
  wheelCx=lx+r.left; wheelCy=ly+r.top;
  wheelCenter.style.left=lx+"px"; wheelCenter.style.top=ly+"px";
  wheelEl.querySelectorAll(".slice").forEach(s=>s.remove()); wheelSlices=[];
  const R=118, n=POSES.length;
  for(let i=0;i<n;i++){ const ang=-Math.PI/2+i*(2*Math.PI/n); const sx=lx+Math.cos(ang)*R, sy=ly+Math.sin(ang)*R;
    const el=document.createElement("div"); el.className="slice"; el.style.left=sx+"px"; el.style.top=sy+"px";
    el.innerHTML=miniSVG(i)+`<small>${POSES[i].label}</small>`; wheelEl.appendChild(el); wheelSlices.push(el); }
  wheelEl.style.display="block"; showHint("Slide to a pose and release");
}
function updateWheel(px,py){
  const r=stage.getBoundingClientRect(), cx=wheelCx-r.left, cy=wheelCy-r.top, lx=px-r.left, ly=py-r.top;
  const dist=Math.hypot(lx-cx,ly-cy); let hot=-1;
  if(dist>36){ const ang=Math.atan2(ly-cy,lx-cx), n=POSES.length; let idx=Math.round((ang+Math.PI/2)/(2*Math.PI/n)); hot=((idx%n)+n)%n; }
  if(hot!==wheelHot){ wheelHot=hot; wheelSlices.forEach((el,i)=>el.classList.toggle("hot",i===hot)); if(hot>=0) haptic(6); }
}
function closeWheel(commit){ wheelOpen=false; wheelEl.style.display="none"; if(commit&&wheelHot>=0) applyPose(wheelHot); else showHint("Tap to change pose · hold for all poses"); }

/* ===== CAPTURE (composite camera/photo + WebGL) -> paint ===== */
function drawCover(src,sw,sh){ const cw=board.width,ch=board.height,sr=sw/sh,dr=cw/ch;let rw,rh,rx,ry;
  if(sr>dr){rh=sh;rw=sh*dr;rx=(sw-rw)/2;ry=0;}else{rw=sw;rh=sw/dr;rx=0;ry=(sh-rh)/2;} ctx.drawImage(src,rx,ry,rw,rh,0,0,cw,ch); }
function capture(){
  const w=stage.clientWidth,h=stage.clientHeight; board.width=Math.round(w*dpr); board.height=Math.round(h*dpr);
  if(bgKind==="cam"&&cam.videoWidth) drawCover(cam,cam.videoWidth,cam.videoHeight);
  else if(bgKind==="photo"&&photo.naturalWidth) drawCover(photo,photo.naturalWidth,photo.naturalHeight);
  else { ctx.fillStyle="#223";ctx.fillRect(0,0,board.width,board.height); }
  renderer.render(scene,camera3); ctx.drawImage(glCanvas,0,0,board.width,board.height);
  flashEl.style.transition="none"; flashEl.style.opacity=".9"; requestAnimationFrame(()=>{ flashEl.style.transition="opacity .5s"; flashEl.style.opacity="0"; });
  haptic(20);
  board.style.display="block"; glCanvas.style.display="none"; cam.style.display="none"; photo.style.display="none"; shutterWrap.style.display="none"; flipBtn.style.display="none";
  mode="paint"; $("#paintUI").style.display="block"; undoStack.length=0; pushUndo();
  showHint("Eyedropper a scene color, then paint the figure");
}

/* ===== PAINT ===== */
let paintColor="#8a7f6a", brush=22, painting=false, eyedrop=false; const undoStack=[];
function pushUndo(){ try{ undoStack.push(ctx.getImageData(0,0,board.width,board.height)); if(undoStack.length>12) undoStack.shift(); }catch(e){} }
function pt(e){ const r=board.getBoundingClientRect(); return {x:(e.clientX-r.left)*(board.width/r.width), y:(e.clientY-r.top)*(board.height/r.height)}; }
function paintAt(p){ ctx.fillStyle=paintColor; ctx.strokeStyle=paintColor; ctx.lineWidth=brush*dpr; ctx.lineCap="round"; ctx.lineJoin="round";
  if(paintAt._l){ ctx.beginPath();ctx.moveTo(paintAt._l.x,paintAt._l.y);ctx.lineTo(p.x,p.y);ctx.stroke(); }
  ctx.beginPath();ctx.arc(p.x,p.y,(brush*dpr)/2,0,7);ctx.fill(); paintAt._l=p; }
function pick(p){ const d=ctx.getImageData(Math.max(0,Math.min(board.width-1,p.x|0)),Math.max(0,Math.min(board.height-1,p.y|0)),1,1).data; paintColor=`rgb(${d[0]},${d[1]},${d[2]})`; document.querySelectorAll(".sw").forEach(s=>s.classList.remove("active")); return paintColor; }
board.addEventListener("pointerdown",e=>{ if(mode!=="paint")return; e.preventDefault(); board.setPointerCapture(e.pointerId); const p=pt(e);
  if(eyedrop){ const c=pick(p); const l=$("#loupe"); l.style.display="block"; l.style.left=e.clientX+"px"; l.style.top=e.clientY+"px"; l.style.background=c; return; }
  pushUndo(); painting=true; paintAt._l=null; paintAt(p); });
board.addEventListener("pointermove",e=>{ if(mode!=="paint")return; const p=pt(e);
  if(eyedrop&&(e.buttons||e.pressure)){ const c=pick(p); const l=$("#loupe"); l.style.left=e.clientX+"px"; l.style.top=e.clientY+"px"; l.style.background=c; return; }
  if(painting) paintAt(p); });
function endPaint(){ if(eyedrop){ eyedrop=false; $("#eyedrop").classList.remove("active"); $("#loupe").style.display="none"; showHint("Color grabbed — now paint the figure"); } painting=false; paintAt._l=null; }
board.addEventListener("pointerup",endPaint); board.addEventListener("pointercancel",endPaint);

const PRESETS=["#7c6f57","#4a5d3a","#2f3b2a","#6b6b6b","#9aa0a6","#2b2b2b","#c9b48a","#3a4a5a","#e8e0d0","#5a4632"];
(function buildSwatches(){ const w=$("#swatches"); const eye=document.createElement("div"); eye.id="eyedrop"; eye.className="sw active"; eye.innerHTML=`<svg viewBox="0 0 24 24"><path d="M18 3l3 3-9.5 9.5-3.5 1 1-3.5L18 3z"/><path d="M14 6l4 4"/></svg>`;
  eye.onclick=()=>{ eyedrop=true; document.querySelectorAll(".sw").forEach(s=>s.classList.remove("active")); eye.classList.add("active"); showHint("Tap the scene to grab its color"); }; w.appendChild(eye);
  PRESETS.forEach(c=>{ const s=document.createElement("div"); s.className="sw"; s.style.background=c; s.onclick=()=>{ paintColor=c; eyedrop=false; document.querySelectorAll(".sw").forEach(x=>x.classList.remove("active")); s.classList.add("active"); }; w.appendChild(s); });
  const pk=document.createElement("label"); pk.className="sw picker"; const inp=document.createElement("input"); inp.type="color"; inp.value="#8a7f6a";
  inp.oninput=e=>{ paintColor=e.target.value; eyedrop=false; document.querySelectorAll(".sw").forEach(x=>x.classList.remove("active")); pk.classList.add("active"); }; pk.appendChild(inp); w.appendChild(pk);
})();
document.querySelectorAll(".bsz").forEach(b=>b.onclick=()=>{ brush=+b.dataset.sz; document.querySelectorAll(".bsz").forEach(x=>x.classList.remove("active")); b.classList.add("active"); });

/* ---- share / save ---- */
function frameForShare(){ const out=document.createElement("canvas"); out.width=board.width; out.height=board.height; const c=out.getContext("2d"); c.drawImage(board,0,0);
  const barH=Math.round(96*dpr); const g=c.createLinearGradient(0,out.height-barH,0,out.height); g.addColorStop(0,"rgba(0,0,0,0)"); g.addColorStop(1,"rgba(0,0,0,.75)");
  c.fillStyle=g; c.fillRect(0,out.height-barH,out.width,barH); c.fillStyle="#fff"; c.textAlign="center";
  c.font=`800 ${Math.round(30*dpr)}px -apple-system,sans-serif`; c.fillText("Can you find me? 🦎", out.width/2, out.height-Math.round(38*dpr));
  c.font=`600 ${Math.round(15*dpr)}px -apple-system,sans-serif`; c.fillStyle="rgba(255,255,255,.7)"; c.fillText("made with KAMO", out.width/2, out.height-Math.round(14*dpr)); return out; }
async function share(){ const blob=await new Promise(r=>frameForShare().toBlob(r,"image/png")); const file=new File([blob],"kamo.png",{type:"image/png"});
  if(navigator.canShare&&navigator.canShare({files:[file]})){ try{ await navigator.share({files:[file],title:"Can you find me?",text:"Can you find the hidden little guy? 🦎 #KAMO"}); return; }catch(e){ if(e.name==="AbortError") return; } }
  save(); showHint("Partage natif indispo → image enregistrée",3000); }
function save(){ frameForShare().toBlob(b=>{ const u=URL.createObjectURL(b); const a=document.createElement("a"); a.href=u; a.download="kamo.png"; a.click(); setTimeout(()=>URL.revokeObjectURL(u),4000); }); }

/* ---- wire ---- */
$("#startBtn").onclick=startCamera;
$("#startPhoto").onclick=()=>$("#fileInput").click();
$("#flip").onclick=()=>{ facing=facing==="environment"?"user":"environment"; startCamera(); };
$("#shutter").onclick=()=>{ if(mode==="compose") capture(); };
$("#fileInput").onchange=e=>{ if(e.target.files[0]) usePhoto(e.target.files[0]); e.target.value=""; };
$("#btnUndo").onclick=()=>{ if(undoStack.length>1){ undoStack.pop(); ctx.putImageData(undoStack[undoStack.length-1],0,0);} };
$("#btnClear").onclick=()=>{ if(undoStack.length) ctx.putImageData(undoStack[0],0,0); };
$("#btnBack").onclick=()=>{ mode="compose"; $("#paintUI").style.display="none"; board.style.display="none"; glCanvas.style.display="block"; shutterWrap.style.display="block"; flipBtn.style.display=(bgKind==="cam")?"flex":"none"; if(bgKind==="cam")cam.style.display="block"; else photo.style.display="block"; showHint("Reposition, then recapture"); };
$("#btnShare").onclick=share;
$("#btnSave").onclick=save;

window.addEventListener("resize",()=>{ dpr=Math.max(1,Math.min(3,window.devicePixelRatio||1)); if(renderer) resize3(); });

/* ---- home slideshow (auto crossfade) ---- */
(function slideshow(){
  const slides=[...document.querySelectorAll("#slideshow .slide")], dotsC=$("#dots");
  slides.forEach(s=>{ const im=new Image(); im.onload=()=>{ s.style.backgroundImage=`url(${s.dataset.src})`; }; im.src=s.dataset.src; const d=document.createElement("i"); dotsC.appendChild(d); });
  const dots=[...dotsC.children]; let idx=0;
  function show(i){ slides.forEach((s,k)=>s.classList.toggle("active",k===i)); dots.forEach((d,k)=>d.classList.toggle("on",k===i)); }
  show(0); setInterval(()=>{ idx=(idx+1)%slides.length; show(idx); }, 3800);
})();

/* Instagram-style floating reactions on the home slideshow */
(function reactions(){
  const EMO=["❤️","😂","🔥","👀","😍","💯","🤯","👏","😮"];
  function spawn(){
    if(startEl.style.display==="none") return; const layer=$("#reactions"); if(!layer) return;
    const s=document.createElement("span"); s.className="reaction"; s.textContent=EMO[Math.floor(Math.random()*EMO.length)];
    s.style.left=(10+Math.random()*70)+"%"; s.style.fontSize=(24+Math.random()*18)+"px";
    s.style.setProperty("--dx",(Math.random()*70-35)+"px"); s.style.setProperty("--rot",(Math.random()*30-15)+"deg"); s.style.setProperty("--d",(2.1+Math.random()*1.5)+"s");
    layer.appendChild(s); setTimeout(()=>s.remove(),3800);
  }
  setInterval(spawn,600);
})();

initThree();

/* debug bridge (?debug) — headless testing only */
if(location.search.includes("debug")){
  window.HIDEY={ setBg:(url)=>{ photo.onload=()=>{}; photo.src=url; photo.style.display="block"; cam.style.display="none"; bgKind="photo"; enterCompose(); },
    pose:(i)=>applyPoseInstant(i), poseTo:(i)=>applyPose(i), capture, paintStroke:(pts,c)=>{ if(c)paintColor=c; pushUndo(); pts.forEach(p=>paintAt({x:p.x*dpr,y:p.y*dpr})); paintAt._l=null; },
    scale:(s)=>root.scale.setScalar(s), move:(x,y)=>root.position.set(x,y,0), poses:POSES.map(p=>p.label),
    wheel:(x,y)=>openWheel(x,y), wheelHi:(x,y)=>updateWheel(x,y) };
}
</script>
